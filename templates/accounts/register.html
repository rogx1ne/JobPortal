{% extends "base.html" %}

{% block title %}Register | Job Portal{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <h1 class="h4 mb-3">Register</h1>
      <div class="list-group">
        <a class="list-group-item list-group-item-action" href="{% url 'accounts:register_employer' %}">
          <div class="fw-semibold">Employer</div>
          <div class="small text-muted">Post jobs and manage applicants.</div>
        </a>
        <a class="list-group-item list-group-item-action" href="{% url 'accounts:register_jobseeker' %}">
          <div class="fw-semibold">Job seeker</div>
          <div class="small text-muted">Browse jobs and apply online.</div>
        </a>
      </div>
    </div>
  </div>
{% endblock %}
